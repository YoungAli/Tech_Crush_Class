<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0631f0 0%, #764ba2 100%);
        }

        .container {
            background: rgba(204, 204, 212, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 320px;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .otp-display {
            background: linear-gradient(145deg, #f0f0f0, #ffffff);
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .otp-display.active {
            border-color: #667eea;
            background: linear-gradient(145deg, #f8f9ff, #ffffff);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .otp-display.expired {
            border-color: #e74c3c;
            background: linear-gradient(145deg, #fff5f5, #ffffff);
        }

        .otp-number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
        }

        .otp-expired {
            font-size: 24px;
            color: #e74c3c;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .timer {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .timer-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
            position: relative;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.1s linear;
            width: 100%;
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .otp-number {
            animation: fadeIn 0.5s ease, pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 OTP Generator</h1>
        <p class="subtitle">Secure One-Time Password</p>
        
        <div class="otp-display" id="otpContainer">
            <div id="otpdisplay">
                <span style="color: #999; font-size: 18px;">Click generate to get OTP</span>
            </div>
            <div class="timer" id="timerDisplay" style="display: none;">
                <span>⏱️ Expires in <span id="countdown">15</span>s</span>
            </div>
            <div class="timer-bar" id="timerBar" style="display: none;">
                <div class="timer-progress" id="timerProgress"></div>
            </div>
        </div>
        
        <button class="generate-btn" id="generatebtn">Generate OTP</button>
        
        <p class="info">OTP will expire in 15 seconds</p>
    </div>

    <script>
        let countdownInterval;
        let timerInterval;

        const generate_OTP = () => {
            // Clear any existing intervals
            clearInterval(countdownInterval);
            clearInterval(timerInterval);

            const otpLength = 6;
            const otp = Math.floor(100000 + Math.random() * 900000);
            
            // Get elements
            const otpDisplay = document.getElementById('otpdisplay');
            const otpContainer = document.getElementById('otpContainer');
            const timerDisplay = document.getElementById('timerDisplay');
            const timerBar = document.getElementById('timerBar');
            const timerProgress = document.getElementById('timerProgress');
            const countdown = document.getElementById('countdown');
            
            // Display OTP with animation
            otpDisplay.innerHTML = `<span class="otp-number">${otp}</span>`;
            otpContainer.className = 'otp-display active';
            otpContainer.classList.remove('expired');
            
            // Show timer elements
            timerDisplay.style.display = 'flex';
            timerBar.style.display = 'block';
            
            // Start countdown
            let timeLeft = 15;
            countdown.textContent = timeLeft;
            timerProgress.style.width = '100%';
            
            // Animate progress bar
            const startTime = Date.now();
            const duration = 15000;
            
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, duration - elapsed);
                const percentage = (remaining / duration) * 100;
                timerProgress.style.width = percentage + '%';
            }, 50);
            
            // Countdown text
            countdownInterval = setInterval(() => {
                timeLeft--;
                countdown.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                }
            }, 1000);
            
            // Expire after 15 seconds
            setTimeout(() => {
                otpDisplay.innerHTML = '<span class="otp-expired">⚠️ Expired</span>';
                otpContainer.className = 'otp-display expired';
                timerDisplay.style.display = 'none';
                timerBar.style.display = 'none';
                clearInterval(timerInterval);
            }, 15000);
        };

        // Event listeners
        document.getElementById("generatebtn").addEventListener('click', generate_OTP);
        
        // Optional: Auto-generate on load (comment out if not needed)
        // window.addEventListener('load', generate_OTP);
    </script>
</body>
</html>
