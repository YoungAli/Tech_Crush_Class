<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strong Password Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            width: 90%;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        .password-display {
            background: linear-gradient(145deg, #f8f9fa, #ffffff);
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
            transition: all 0.3s ease;
        }

        .password-display:focus-within {
            border-color: #2a5298;
            box-shadow: 0 0 20px rgba(42, 82, 152, 0.2);
        }

        .password-text {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            word-break: break-all;
            letter-spacing: 2px;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .password-placeholder {
            color: #999;
            font-size: 16px;
        }

        .copy-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #2a5298;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            opacity: 0;
        }

        .password-display:hover .copy-btn,
        .password-display:focus-within .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: #1e3c72;
            transform: translateY(-50%) scale(1.05);
        }

        .copy-btn.copied {
            background: #27ae60;
        }

        .strength-meter {
            margin-top: 15px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: all 0.4s ease;
        }

        .strength-bar.weak {
            width: 33%;
            background: #e74c3c;
        }

        .strength-bar.medium {
            width: 66%;
            background: #f39c12;
        }

        .strength-bar.strong {
            width: 100%;
            background: #27ae60;
        }

        .strength-text {
            text-align: center;
            margin-top: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .strength-text.weak { color: #e74c3c; }
        .strength-text.medium { color: #f39c12; }
        .strength-text.strong { color: #27ae60; }

        .options {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .option-row:last-child {
            margin-bottom: 0;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #555;
            font-size: 14px;
        }

        .option-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2a5298;
            cursor: pointer;
        }

        .length-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .length-slider {
            width: 150px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #ddd;
            border-radius: 3px;
            outline: none;
        }

        .length-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #2a5298;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .length-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .length-value {
            background: #2a5298;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(42, 82, 152, 0.4);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(42, 82, 152, 0.5);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .history {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e0e0e0;
        }

        .history-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #555;
        }

        .history-item .time {
            font-size: 11px;
            color: #999;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #27ae60;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            
            .password-text {
                font-size: 18px;
            }
            
            .length-slider {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Strong Password Generator</h1>
        <p class="subtitle">Create strong, secure passwords</p>
        
        <div class="password-display" id="passwordDisplay">
            <div class="password-text" id="passwordText">
                <span class="password-placeholder">Click generate to create password</span>
            </div>
            <button class="copy-btn" id="copyBtn" onclick="copyPassword()">Copy</button>
            <div class="strength-meter">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-text" id="strengthText"></div>
        </div>

        <div class="options">
            <div class="option-row">
                <label class="option-label">
                    <span>Password Length</span>
                </label>
                <div class="length-control">
                    <input type="range" class="length-slider" id="lengthSlider" 
                           min="8" max="32" value="16" oninput="updateLength()">
                    <span class="length-value" id="lengthValue">16</span>
                </div>
            </div>
            
            <div class="option-row">
                <label class="option-label">
                    <input type="checkbox" id="uppercase" checked>
                    <span>Uppercase (A-Z)</span>
                </label>
            </div>
            
            <div class="option-row">
                <label class="option-label">
                    <input type="checkbox" id="lowercase" checked>
                    <span>Lowercase (a-z)</span>
                </label>
            </div>
            
            <div class="option-row">
                <label class="option-label">
                    <input type="checkbox" id="numbers" checked>
                    <span>Numbers (0-9)</span>
                </label>
            </div>
            
            <div class="option-row">
                <label class="option-label">
                    <input type="checkbox" id="symbols" checked>
                    <span>Symbols (!@#$...)</span>
                </label>
            </div>
        </div>

        <button class="generate-btn" id="generateBtn" onclick="generatePassword()">
            Generate Strong Password
        </button>

        <div class="history" id="historySection" style="display: none;">
            <div class="history-title">📋 Recent Passwords</div>
            <div id="historyList"></div>
        </div>
    </div>

    <div class="toast" id="toast">✓ Copied to clipboard!</div>

    <script>
        let passwordHistory = [];

        const charSets = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        function updateLength() {
            const slider = document.getElementById('lengthSlider');
            document.getElementById('lengthValue').textContent = slider.value;
        }

        function generatePassword() {
            const length = parseInt(document.getElementById('lengthSlider').value);
            const useUpper = document.getElementById('uppercase').checked;
            const useLower = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;

            // Validation: at least one option must be selected
            if (!useUpper && !useLower && !useNumbers && !useSymbols) {
                alert('Please select at least one character type!');
                return;
            }

            // Build character pool
            let charPool = '';
            const requiredChars = [];

            if (useUpper) {
                charPool += charSets.uppercase;
                requiredChars.push(getRandomChar(charSets.uppercase));
            }
            if (useLower) {
                charPool += charSets.lowercase;
                requiredChars.push(getRandomChar(charSets.lowercase));
            }
            if (useNumbers) {
                charPool += charSets.numbers;
                requiredChars.push(getRandomChar(charSets.numbers));
            }
            if (useSymbols) {
                charPool += charSets.symbols;
                requiredChars.push(getRandomChar(charSets.symbols));
            }

            // Generate remaining characters
            let password = requiredChars.join("");
            for (let i = requiredChars.length; i < length; i++) {
                password += getRandomChar(charPool);
            }

            // Shuffle password
            password = shuffleString(password);

            // Display
            document.getElementById('passwordText').textContent = password;
            
            // Calculate and show strength
            const strength = calculateStrength(password);
            showStrength(strength);

            // Add to history
            addToHistory(password);
        }

        function getRandomChar(str) {
            const array = new Uint32Array(1);
            crypto.getRandomValues(array);
            return str[array[0] % str.length];
        }

        function shuffleString(str) {
            const arr = str.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const array = new Uint32Array(1);
                crypto.getRandomValues(array);
                const j = array[0] % (i + 1);
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr.join('');
        }

        function calculateStrength(password) {
            let score = 0;
            
            // Length points
            if (password.length >= 8) score += 1;
            if (password.length >= 12) score += 1;
            if (password.length >= 16) score += 1;
            
            // Character variety points
            if (/[A-Z]/.test(password)) score += 1;
            if (/[a-z]/.test(password)) score += 1;
            if (/[0-9]/.test(password)) score += 1;
            if (/[^A-Za-z0-9]/.test(password)) score += 1;
            
            // Bonus for mixing
            if (score >= 6) return 'strong';
            if (score >= 4) return 'medium';
            return 'weak';
        }

        function showStrength(strength) {
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            bar.className = 'strength-bar ' + strength;
            text.className = 'strength-text ' + strength;
            
            const labels = {
                weak: '⚠️ Weak - Easy to crack',
                medium: '⚡ Medium - Could be stronger',
                strong: '✅ Strong - Very secure!'
            };
            
            text.textContent = labels[strength];
        }

        function copyPassword() {
            const password = document.getElementById('passwordText').textContent;
            if (password.includes('Click generate')) return;
            
            navigator.clipboard.writeText(password).then(() => {
                const btn = document.getElementById('copyBtn');
                const toast = document.getElementById('toast');
                
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                
                toast.classList.add('show');
                
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                    toast.classList.remove('show');
                }, 2000);
            });
        }

        function addToHistory(password) {
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            passwordHistory.unshift({ password, time });
            if (passwordHistory.length > 5) passwordHistory.pop();
            
            const section = document.getElementById('historySection');
            const list = document.getElementById('historyList');
            
            section.style.display = 'block';
            list.innerHTML = passwordHistory.map(item => `
                <div class="history-item">
                    <span>${maskPassword(item.password)}</span>
                    <span class="time">${item.time}</span>
                </div>
            `).join('');
        }

        function maskPassword(pass) {
            if (pass.length <= 8) return pass;
            return pass.substring(0, 4) + '•'.repeat(pass.length - 8) + pass.substring(pass.length - 4);
        }

        // Generate on load
        window.addEventListener('load', generatePassword);
    </script>
</body>
</html>
